spring.application.name=MatLadan

## DATABASE :: SUPABASE :: Pooler Connection :: IPv4 ##
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=3

## JPA / HIBERNATE ###
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

## Remember to put the FlyWay to false when you are using the test ##
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

## JWT ##
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000